name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 185.135.137.223
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/portfolio-website
            git pull origin main
            npm install --production=false
            npm run build
            pm2 restart portfolio || pm2 start pm2.config.js
            pm2 save
